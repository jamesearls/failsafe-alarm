# failsafe-alarm.yaml
# ESPHome firmware for Olimex ESP32-C3-DevKit-Lipo
# Hardware: Waveshare HMMD S3KM1110 24GHz radar + DFRobot DFR0032 passive buzzer
#
# Wiring summary:
#   GPIO4  → buzzer signal (LEDC PWM)
#   GPIO5  → radar OT2 presence output (digital input, pulldown)
#   GPIO3  → optional radar RX line (ESP TX → radar RX)  \  only needed if
#   GPIO6  → optional radar TX line (radar TX → ESP RX)  /  sending UART config at boot

# -----------------------------------------------------------------------
# TUNABLE SUBSTITUTIONS — edit these before flashing, no code changes needed
# -----------------------------------------------------------------------
substitutions:
  # Alarm window: weekdays only
  alarm_start_hour:   "8"
  alarm_start_minute: "30"
  alarm_end_hour:     "9"
  alarm_end_minute:   "30"

  # Normal alarm: loud, continuous
  alarm_freq_hz:  "2500"   # Hz — 2–3 kHz is most piercing for piezo buzzers
  alarm_duty:     "0.80"   # 0.0–1.0; 80% is near-maximum for passive piezo

  # Debug/calibration: gentle intermittent pip
  debug_freq_hz:  "1000"   # lower pitch, less aggressive
  debug_duty:     "0.15"   # quiet — you'll be right next to it while calibrating

# -----------------------------------------------------------------------
# BOARD & FRAMEWORK
# -----------------------------------------------------------------------
esphome:
  name: failsafe-alarm
  friendly_name: Failsafe Alarm

esp32:
  # esp32-c3-devkitm-1 is the upstream ESPHome/PlatformIO alias for the C3 DevKit.
  # The Olimex ESP32-C3-DevKit-Lipo shares the same ESP32-C3 chip and 4MB flash;
  # this board definition works correctly for our pin usage.
  board: esp32-c3-devkitm-1
  variant: ESP32C3
  framework:
    type: arduino

# -----------------------------------------------------------------------
# LOGGING — reduce to INFO once you've confirmed everything works
# -----------------------------------------------------------------------
logger:
  level: DEBUG

# -----------------------------------------------------------------------
# WI-FI + FALLBACK AP
# If the main Wi-Fi is unreachable (e.g. router down) the device brings up a
# fallback access point so you can still reach it for OTA or debug.
# -----------------------------------------------------------------------
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "failsafe-fallback"
    password: !secret fallback_ap_password

captive_portal:   # serves a Wi-Fi config page on the fallback AP

# -----------------------------------------------------------------------
# OTA + API
# OTA lets you reflash over Wi-Fi after the first USB flash.
# The native API exposes switches/sensors to the ESPHome dashboard and,
# optionally, to Home Assistant (not required for this build).
# -----------------------------------------------------------------------
ota:
  - platform: esphome
    password: !secret ota_password

api:
  encryption:
    key: !secret api_key   # generate with: openssl rand -base64 32

# -----------------------------------------------------------------------
# TIME — SNTP with Europe/London timezone (handles GMT↔BST automatically)
# ESPHome's SNTP component re-syncs on its own periodic schedule (~24h),
# so DST changes are picked up without any extra configuration.
# -----------------------------------------------------------------------
time:
  - platform: sntp
    id: sntp_time
    timezone: "Europe/London"
    servers:
      - 0.uk.pool.ntp.org
      - 1.uk.pool.ntp.org
      - 2.pool.ntp.org
    on_time_sync:
      - logger.log:
          level: INFO
          format: "SNTP time synced"

    on_time:
      # At window OPEN: evaluate immediately in case we're already in bed
      - seconds: 0
        minutes: ${alarm_start_minute}
        hours: ${alarm_start_hour}
        days_of_week: MON-FRI
        then:
          - logger.log: "Alarm window OPENED"
          - script.execute: evaluate_buzzer

      # At window CLOSE: unconditionally silence (catches the case where
      # presence is still detected at 09:30)
      - seconds: 0
        minutes: ${alarm_end_minute}
        hours: ${alarm_end_hour}
        days_of_week: MON-FRI
        then:
          - logger.log: "Alarm window CLOSED"
          - script.execute: silence

# -----------------------------------------------------------------------
# OUTPUT — passive buzzer via LEDC PWM on GPIO4
# Frequency (pitch) and duty cycle (loudness proxy) are set at alarm time.
# Swapping to a louder transducer later: change the pin or add a MOSFET
# driver; the script layer above this doesn't need to change.
# -----------------------------------------------------------------------
output:
  - platform: ledc
    pin: GPIO4
    id: buzzer_out

# -----------------------------------------------------------------------
# BINARY SENSOR — radar OT2 presence pin on GPIO5
# OT2 goes HIGH while a person is detected, LOW when the zone is clear.
# delayed_off: 500ms debounces momentary radar dropouts without delaying
# the genuine "person left" event beyond the 1–2 s requirement.
# -----------------------------------------------------------------------
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO5
      mode:
        input: true
        pulldown: true   # defined LOW when radar absent or disconnected
    id: radar_presence
    name: "Radar Presence"
    device_class: occupancy
    filters:
      - delayed_off: 500ms
    on_press:
      - logger.log: "Radar: PRESENT"
      - script.execute: evaluate_buzzer
    on_release:
      # This is the core safety guarantee: presence loss → immediate silence.
      - logger.log: "Radar: ABSENT — silencing"
      - script.execute: silence

# -----------------------------------------------------------------------
# SWITCHES
# -----------------------------------------------------------------------
switch:
  # Debug/calibration mode: buzzer follows presence regardless of time window.
  # Tone is gentle so you can work right next to the hardware while tuning.
  - platform: template
    name: "Debug Mode"
    id: debug_mode
    icon: "mdi:bug-check"
    optimistic: true
    restore_mode: ALWAYS_OFF   # never start in debug mode after a reboot
    on_turn_on:
      - logger.log:
          level: WARN
          format: "DEBUG MODE ON — time window ignored, volume reduced"
      - script.execute: evaluate_buzzer
    on_turn_off:
      - logger.log:
          level: WARN
          format: "DEBUG MODE OFF — normal time-gated behaviour"
      - script.execute: evaluate_buzzer   # re-evaluate: silence if outside window

# -----------------------------------------------------------------------
# SCRIPTS
# Three scripts with clear separation of concerns:
#   evaluate_buzzer — the single decision point; everything calls this
#   alarm_on        — activates the output (differently for debug vs normal)
#   silence         — deactivates the output and kills alarm_on if running
# -----------------------------------------------------------------------
script:
  # evaluate_buzzer: called on every state change (presence, debug toggle,
  # window open/close). Decides whether the buzzer should be on or off.
  - id: evaluate_buzzer
    mode: restart   # if called again before done, restart the decision
    then:
      - if:
          condition:
            lambda: |-
              // No point sounding if nobody is there
              if (!id(radar_presence).state) return false;

              // Debug mode: bypass time gate entirely
              if (id(debug_mode).state) return true;

              // Normal mode: require a valid time
              auto t = id(sntp_time).now();
              if (!t.is_valid()) return false;

              // day_of_week: 0=Sun, 1=Mon, …, 5=Fri, 6=Sat (ESPTime convention)
              if (t.day_of_week < 1 || t.day_of_week > 5) return false;

              // Compare total minutes to avoid hour/minute boundary bugs
              int now_m   = t.hour * 60 + t.minute;
              int start_m = ${alarm_start_hour} * 60 + ${alarm_start_minute};
              int end_m   = ${alarm_end_hour}   * 60 + ${alarm_end_minute};
              return now_m >= start_m && now_m < end_m;
          then:
            - script.execute: alarm_on
          else:
            - script.execute: silence

  # alarm_on: activates the buzzer.
  # Normal mode: continuous full-volume tone.
  # Debug mode: quiet intermittent pip (while loop runs until presence drops
  # or debug is turned off; script.stop from `silence` kills it cleanly).
  - id: alarm_on
    mode: restart
    then:
      - if:
          condition:
            switch.is_on: debug_mode
          then:
            - while:
                condition:
                  and:
                    - switch.is_on: debug_mode
                    - binary_sensor.is_on: radar_presence
                then:
                  - output.ledc.set_frequency:
                      id: buzzer_out
                      frequency: !lambda "return ${debug_freq_hz};"
                  - output.set_level:
                      id: buzzer_out
                      level: ${debug_duty}
                  - delay: 150ms
                  - output.turn_off: buzzer_out
                  - delay: 850ms
          else:
            - output.ledc.set_frequency:
                id: buzzer_out
                frequency: !lambda "return ${alarm_freq_hz};"
            - output.set_level:
                id: buzzer_out
                level: ${alarm_duty}
            - logger.log:
                level: WARN
                format: "ALARM ON"

  # silence: turns off the output and kills any running alarm_on loop.
  # mode: single means stacked calls are dropped — idempotent and safe.
  - id: silence
    mode: single
    then:
      - output.turn_off: buzzer_out
      - script.stop: alarm_on
      - logger.log: "Buzzer SILENCED"

# -----------------------------------------------------------------------
# STATUS SENSOR — visible in ESPHome dashboard and logs
# -----------------------------------------------------------------------
text_sensor:
  - platform: template
    name: "Alarm Status"
    update_interval: 30s
    lambda: |-
      if (id(debug_mode).state)          return {"DEBUG (calibration)"};
      auto t = id(sntp_time).now();
      if (!t.is_valid())                 return {"no time sync"};
      int m = t.hour * 60 + t.minute;
      int s = ${alarm_start_hour} * 60 + ${alarm_start_minute};
      int e = ${alarm_end_hour}   * 60 + ${alarm_end_minute};
      bool wd = (t.day_of_week >= 1 && t.day_of_week <= 5);
      if (wd && m >= s && m < e)         return {"WINDOW ACTIVE"};
      return {"idle"};
