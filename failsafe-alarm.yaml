# failsafe-alarm.yaml
# ESPHome firmware for Olimex ESP32-C3-DevKit-Lipo
# Hardware: Waveshare HMMD S3KM1110 24GHz radar + DFRobot DFR0032 passive buzzer
#
# Wiring summary:
#   GPIO4  → buzzer signal (LEDC PWM)
#   GPIO5  → radar OT2 presence output (digital input, pulldown)
#   GPIO3  → optional radar RX line (ESP TX → radar RX)  \  only needed if
#   GPIO6  → optional radar TX line (radar TX → ESP RX)  /  sending UART config at boot

# -----------------------------------------------------------------------
# TUNABLE SUBSTITUTIONS — edit these before flashing, no code changes needed
# -----------------------------------------------------------------------
substitutions:
  # Alarm window: weekdays only
  alarm_start_hour:   "8"
  alarm_start_minute: "30"
  alarm_end_hour:     "9"
  alarm_end_minute:   "30"

  # Normal alarm: loud, continuous (duty is now a runtime slider; this is the boot default)
  alarm_freq_hz:       "2500"   # Hz — 2–3 kHz is most piercing for piezo buzzers
  alarm_duty_default:  "80"     # percentage, 0–100; stored in number entity at runtime

  # Debug/calibration: gentle intermittent pip
  debug_freq_hz:  "1000"   # lower pitch, less aggressive
  debug_duty:     "0.15"   # quiet — you'll be right next to it while calibrating

# -----------------------------------------------------------------------
# BOARD & FRAMEWORK
# -----------------------------------------------------------------------
esphome:
  name: failsafe-alarm
  friendly_name: Failsafe Alarm
  on_boot:
    # Priority -100: runs after all entities have restored their saved values from flash,
    # so configure_radar reads the correct slider values, not just initial_value defaults.
    priority: -100
    then:
      - delay: 1500ms   # give S3KM1110's PY32F003 MCU time to finish its own startup
      - script.execute: configure_radar

esp32:
  # esp32-c3-devkitm-1 is the upstream ESPHome/PlatformIO alias for the C3 DevKit.
  # The Olimex ESP32-C3-DevKit-Lipo shares the same ESP32-C3 chip and 4MB flash;
  # this board definition works correctly for our pin usage.
  board: esp32-c3-devkitm-1
  variant: ESP32C3
  framework:
    type: arduino

# -----------------------------------------------------------------------
# LOGGING — reduce to INFO once you've confirmed everything works
# -----------------------------------------------------------------------
logger:
  level: DEBUG

# -----------------------------------------------------------------------
# WI-FI + FALLBACK AP
# If the main Wi-Fi is unreachable (e.g. router down) the device brings up a
# fallback access point so you can still reach it for OTA or debug.
# -----------------------------------------------------------------------
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "failsafe-fallback"
    password: !secret fallback_ap_password

captive_portal:   # serves a Wi-Fi config page on the fallback AP

# Web interface at http://failsafe-alarm.local — exposes switches and sensors
web_server:
  port: 80

# -----------------------------------------------------------------------
# OTA + API
# OTA lets you reflash over Wi-Fi after the first USB flash.
# The native API exposes switches/sensors to the ESPHome dashboard and,
# optionally, to Home Assistant (not required for this build).
# -----------------------------------------------------------------------
ota:
  - platform: esphome
    password: !secret ota_password

api:
  encryption:
    key: !secret api_key   # generate with: openssl rand -base64 32

# -----------------------------------------------------------------------
# TIME — SNTP with Europe/London timezone (handles GMT↔BST automatically)
# ESPHome's SNTP component re-syncs on its own periodic schedule (~24h),
# so DST changes are picked up without any extra configuration.
# -----------------------------------------------------------------------
time:
  - platform: sntp
    id: sntp_time
    timezone: "Europe/London"
    servers:
      - 0.uk.pool.ntp.org
      - 1.uk.pool.ntp.org
      - 2.pool.ntp.org
    on_time_sync:
      - logger.log:
          level: INFO
          format: "SNTP time synced"

    on_time:
      # Re-evaluate every minute so runtime window changes take effect promptly.
      # evaluate_buzzer handles both "window just opened" and "window just closed"
      # via its lambda — no need for separate open/close triggers.
      - seconds: 0
        minutes: /1
        then:
          - script.execute: evaluate_buzzer

# -----------------------------------------------------------------------
# UART — radar configuration at boot (IO3=ESP TX→radar RX, IO6=radar TX→ESP RX)
# Only used for the on_boot config sequence; OT2 is still the runtime presence signal.
# -----------------------------------------------------------------------
uart:
  - id: radar_uart
    tx_pin: GPIO3
    rx_pin: GPIO6
    baud_rate: 115200

# -----------------------------------------------------------------------
# OUTPUT — passive buzzer via LEDC PWM on GPIO4
# Frequency (pitch) and duty cycle (loudness proxy) are set at alarm time.
# Swapping to a louder transducer later: change the pin or add a MOSFET
# driver; the script layer above this doesn't need to change.
# -----------------------------------------------------------------------
output:
  - platform: ledc
    pin: GPIO4
    id: buzzer_out

# -----------------------------------------------------------------------
# BINARY SENSOR — radar OT2 presence pin on GPIO5
# OT2 goes HIGH while a person is detected, LOW when the zone is clear.
# delayed_off: 500ms debounces momentary radar dropouts without delaying
# the genuine "person left" event beyond the 1–2 s requirement.
# -----------------------------------------------------------------------
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO5
      mode:
        input: true
        pulldown: true   # defined LOW when radar absent or disconnected
    id: radar_presence
    name: "Radar Presence"
    device_class: occupancy
    filters:
      - delayed_off: 2s   # absorbs OT2 dropouts during UART config sequence and radar jitter
    on_press:
      - logger.log: "Radar: PRESENT"
      - script.execute: evaluate_buzzer
    on_release:
      # This is the core safety guarantee: presence loss → immediate silence.
      - logger.log: "Radar: ABSENT — silencing"
      - script.execute: silence

# -----------------------------------------------------------------------
# NUMBERS — runtime-adjustable sliders, all stored in flash across reboots
# -----------------------------------------------------------------------
number:
  - platform: template
    name: "Alarm Volume"
    id: alarm_volume
    icon: "mdi:volume-high"
    min_value: 0
    max_value: 100
    step: 5
    initial_value: ${alarm_duty_default}
    optimistic: true
    restore_value: true
    unit_of_measurement: "%"

  # Max detection gate: each gate ≈ 0.70m from sensor. Gate 2 = ~1.4m, gate 3 = ~2.1m.
  # Changing this re-sends UART config immediately.
  - platform: template
    name: "Radar Max Gate"
    id: radar_max_gate
    icon: "mdi:radar"
    min_value: 1
    max_value: 8
    step: 1
    initial_value: 2
    optimistic: true
    restore_value: true
    unit_of_measurement: "gates"

  # How long after a person leaves before OT2 goes LOW.
  # 1s = sharpest cutoff; increase if you get false absences mid-sleep.
  - platform: template
    name: "Radar Disappearance Delay"
    id: radar_disappearance_delay
    icon: "mdi:timer-off"
    min_value: 1
    max_value: 10
    step: 1
    initial_value: 1
    optimistic: true
    restore_value: true
    unit_of_measurement: "s"


# -----------------------------------------------------------------------
# SELECT — time window dropdowns (stored in flash, survive reboots)
# evaluate_buzzer reads these as strings and converts to int.
# -----------------------------------------------------------------------
select:
  - platform: template
    name: "Window Start Hour"
    id: window_start_hour
    icon: "mdi:clock-start"
    optimistic: true
    restore_value: true
    initial_option: "${alarm_start_hour}"
    options: ["4","5","6","7","8","9","10","11","12"]

  - platform: template
    name: "Window Start Minute"
    id: window_start_minute
    icon: "mdi:clock-start"
    optimistic: true
    restore_value: true
    initial_option: "${alarm_start_minute}"
    options: ["0","5","10","15","20","25","30","35","40","45","50","55"]

  - platform: template
    name: "Window End Hour"
    id: window_end_hour
    icon: "mdi:clock-end"
    optimistic: true
    restore_value: true
    initial_option: "${alarm_end_hour}"
    options: ["4","5","6","7","8","9","10","11","12"]

  - platform: template
    name: "Window End Minute"
    id: window_end_minute
    icon: "mdi:clock-end"
    optimistic: true
    restore_value: true
    initial_option: "${alarm_end_minute}"
    options: ["0","5","10","15","20","25","30","35","40","45","50","55"]

# -----------------------------------------------------------------------
# BUTTON — test the buzzer at current alarm volume for 3 seconds
# -----------------------------------------------------------------------
button:
  - platform: template
    name: "Apply Radar Config"
    icon: "mdi:radar"
    on_press:
      - script.execute: configure_radar

  - platform: template
    name: "Test Buzzer"
    icon: "mdi:bullhorn"
    on_press:
      - output.ledc.set_frequency:
          id: buzzer_out
          frequency: !lambda "return ${alarm_freq_hz};"
      - output.set_level:
          id: buzzer_out
          level: !lambda "return id(alarm_volume).state / 100.0;"
      - delay: 3s
      - output.turn_off: buzzer_out

# -----------------------------------------------------------------------
# SWITCHES
# -----------------------------------------------------------------------
switch:
  # Debug/calibration mode: buzzer follows presence regardless of time window.
  # Tone is gentle so you can work right next to the hardware while tuning.
  - platform: template
    name: "Debug Mode"
    id: debug_mode
    icon: "mdi:bug-check"
    optimistic: true
    restore_mode: ALWAYS_OFF   # never start in debug mode after a reboot
    on_turn_on:
      - logger.log:
          level: WARN
          format: "DEBUG MODE ON — time window ignored, volume reduced"
      - script.execute: evaluate_buzzer
    on_turn_off:
      - logger.log:
          level: WARN
          format: "DEBUG MODE OFF — normal time-gated behaviour"
      - script.execute: evaluate_buzzer   # re-evaluate: silence if outside window

# -----------------------------------------------------------------------
# INTERVAL — parse S3KM1110 UART data frames to get distance + presence
# Data frame: F4 F3 F2 F1 | 2-byte len LE | 1-byte detected | 2-byte dist LE
#             | 32-byte gate energy | F8 F7 F6 F5  (45 bytes total)
# Command ACK frames start with 0xFD and are silently ignored here.
# -----------------------------------------------------------------------
interval:
  - interval: 50ms
    then:
      - lambda: |-
          static uint8_t buf[45];
          static uint8_t pos = 0;
          static bool in_frame = false;

          while (id(radar_uart).available()) {
            uint8_t b = 0;
            if (!id(radar_uart).read_byte(&b)) break;

            if (!in_frame) {
              // Accumulate the 4-byte data-frame header F4 F3 F2 F1
              if      (pos == 0 && b == 0xF4) buf[pos++] = b;
              else if (pos == 1 && b == 0xF3) buf[pos++] = b;
              else if (pos == 2 && b == 0xF2) buf[pos++] = b;
              else if (pos == 3 && b == 0xF1) { buf[pos++] = b; in_frame = true; }
              else    pos = (b == 0xF4) ? 1 : 0;   // restart if header breaks
            } else {
              if (pos < 45) {
                buf[pos++] = b;
                if (pos >= 8) {
                  uint16_t data_len   = buf[4] | (buf[5] << 8);
                  uint16_t frame_size = 4 + 2 + data_len + 4;
                  if (pos == frame_size) {
                    // Validate footer
                    if (buf[pos-4]==0xF8 && buf[pos-3]==0xF7 && buf[pos-2]==0xF6 && buf[pos-1]==0xF5) {
                      bool detected  = (buf[6] == 0x01);
                      uint16_t dist  = buf[7] | (buf[8] << 8);
                      id(radar_distance).publish_state(detected ? (float)dist : 0.0f);
                    }
                    pos = 0; in_frame = false;
                  }
                }
              } else {
                pos = 0; in_frame = false;   // overrun, discard
              }
            }
          }

# -----------------------------------------------------------------------
# SCRIPTS
# Four scripts:
#   configure_radar — sends UART config using current slider values
#   evaluate_buzzer — the single decision point; everything calls this
#   alarm_on        — activates the output (differently for debug vs normal)
#   silence         — deactivates the output and kills alarm_on if running
# -----------------------------------------------------------------------
script:
  # configure_radar: sends OpenMode → SetConfig (max gate + disappearance delay) → CloseMode
  # → Report mode using the current slider values. Called at boot and whenever sliders change.
  # mode: single drops re-entrant calls; the config takes ~2s so don't stack them.
  - id: configure_radar
    mode: single
    then:
      # Open command mode: cmd=0xFF payload=0x0001
      - uart.write:
          id: radar_uart
          data: [0xFD,0xFC,0xFB,0xFA, 0x04,0x00, 0xFF,0x00, 0x01,0x00, 0x04,0x03,0x02,0x01]
      - delay: 300ms
      # SetConfig MaxDistance — read gate value from slider
      - lambda: |-
          uint8_t gate = (uint8_t)id(radar_max_gate).state;
          uint8_t cmd[] = {0xFD,0xFC,0xFB,0xFA, 0x08,0x00, 0x07,0x00,
                           0x01,0x00, gate,0x00,0x00,0x00, 0x04,0x03,0x02,0x01};
          id(radar_uart).write_array(cmd, sizeof(cmd));
      - delay: 300ms
      # Close command mode
      - uart.write:
          id: radar_uart
          data: [0xFD,0xFC,0xFB,0xFA, 0x02,0x00, 0xFE,0x00, 0x04,0x03,0x02,0x01]
      - delay: 300ms
      # Open command mode again for disappearance delay
      - uart.write:
          id: radar_uart
          data: [0xFD,0xFC,0xFB,0xFA, 0x04,0x00, 0xFF,0x00, 0x01,0x00, 0x04,0x03,0x02,0x01]
      - delay: 300ms
      # SetConfig DisappearanceDelay — read seconds from slider
      - lambda: |-
          uint16_t d = (uint16_t)id(radar_disappearance_delay).state;
          uint8_t cmd[] = {0xFD,0xFC,0xFB,0xFA, 0x08,0x00, 0x07,0x00, 0x04,0x00,
                           (uint8_t)(d & 0xFF),(uint8_t)(d >> 8),0x00,0x00,
                           0x04,0x03,0x02,0x01};
          id(radar_uart).write_array(cmd, sizeof(cmd));
      - delay: 300ms
      # Close command mode
      - uart.write:
          id: radar_uart
          data: [0xFD,0xFC,0xFB,0xFA, 0x02,0x00, 0xFE,0x00, 0x04,0x03,0x02,0x01]
      - delay: 300ms
      # Re-enable Report mode so OT2 and UART data frames resume
      - uart.write:
          id: radar_uart
          data: [0xFD,0xFC,0xFB,0xFA, 0x08,0x00, 0x12,0x00, 0x00,0x00, 0x04,0x00,0x00,0x00, 0x04,0x03,0x02,0x01]
      - logger.log:
          level: INFO
          format: "Radar configured"

  # evaluate_buzzer: called on every state change (presence, debug toggle,
  # window open/close). Decides whether the buzzer should be on or off.
  - id: evaluate_buzzer
    mode: restart   # if called again before done, restart the decision
    then:
      - if:
          condition:
            lambda: |-
              // No point sounding if nobody is there
              if (!id(radar_presence).state) return false;

              // Debug mode: bypass time gate entirely
              if (id(debug_mode).state) return true;

              // Normal mode: require a valid time
              auto t = id(sntp_time).now();
              if (!t.is_valid()) return false;

              // day_of_week: 0=Sun, 1=Mon, …, 5=Fri, 6=Sat (ESPTime convention)
              if (t.day_of_week < 1 || t.day_of_week > 5) return false;

              // Read select entities (strings) and convert to int for comparison.
              int now_m   = t.hour * 60 + t.minute;
              int start_m = std::stoi(id(window_start_hour).state)  * 60 + std::stoi(id(window_start_minute).state);
              int end_m   = std::stoi(id(window_end_hour).state)    * 60 + std::stoi(id(window_end_minute).state);
              return now_m >= start_m && now_m < end_m;
          then:
            - script.execute: alarm_on
          else:
            - script.execute: silence

  # alarm_on: activates the buzzer.
  # Normal mode: continuous full-volume tone.
  # Debug mode: quiet intermittent pip (while loop runs until presence drops
  # or debug is turned off; script.stop from `silence` kills it cleanly).
  - id: alarm_on
    mode: restart
    then:
      - if:
          condition:
            switch.is_on: debug_mode
          then:
            - while:
                condition:
                  and:
                    - switch.is_on: debug_mode
                    - binary_sensor.is_on: radar_presence
                then:
                  - output.ledc.set_frequency:
                      id: buzzer_out
                      frequency: !lambda "return ${debug_freq_hz};"
                  - output.set_level:
                      id: buzzer_out
                      level: ${debug_duty}
                  - delay: 150ms
                  - output.turn_off: buzzer_out
                  - delay: 850ms
          else:
            - output.ledc.set_frequency:
                id: buzzer_out
                frequency: !lambda "return ${alarm_freq_hz};"
            - output.set_level:
                id: buzzer_out
                level: !lambda "return id(alarm_volume).state / 100.0;"
            - logger.log:
                level: WARN
                format: "ALARM ON"

  # silence: turns off the output and kills any running alarm_on loop.
  # mode: single means stacked calls are dropped — idempotent and safe.
  - id: silence
    mode: single
    then:
      - output.turn_off: buzzer_out
      - script.stop: alarm_on
      - logger.log: "Buzzer SILENCED"

# -----------------------------------------------------------------------
# SENSORS — uptime and Wi-Fi signal for at-a-glance device health
# -----------------------------------------------------------------------
sensor:
  - platform: uptime
    name: "Uptime"
    update_interval: 60s

  - platform: wifi_signal
    name: "Wi-Fi Signal"
    update_interval: 60s

  # Published by the UART interval parser above. 0 = no target; >0 = distance in cm.
  # The web server graphs this automatically, giving a detection-over-time view.
  - platform: template
    name: "Radar Distance"
    id: radar_distance
    unit_of_measurement: "cm"
    device_class: distance
    state_class: measurement
    accuracy_decimals: 0
    update_interval: never   # pushed by the UART parser on every data frame

# -----------------------------------------------------------------------
# STATUS SENSOR — visible in ESPHome dashboard and logs
# -----------------------------------------------------------------------
text_sensor:
  - platform: template
    name: "Alarm Status"
    update_interval: 30s
    lambda: |-
      if (id(debug_mode).state)          return {"DEBUG (calibration)"};
      auto t = id(sntp_time).now();
      if (!t.is_valid())                 return {"no time sync"};
      int m = t.hour * 60 + t.minute;
      int s = std::stoi(id(window_start_hour).state) * 60 + std::stoi(id(window_start_minute).state);
      int e = std::stoi(id(window_end_hour).state)   * 60 + std::stoi(id(window_end_minute).state);
      bool wd = (t.day_of_week >= 1 && t.day_of_week <= 5);
      if (wd && m >= s && m < e)         return {"WINDOW ACTIVE"};
      return {"idle"};
