# failsafe-alarm.yaml
# ESPHome firmware for Olimex ESP32-C3-DevKit-Lipo
# Hardware: Waveshare HMMD S3KM1110 24GHz radar + DFRobot DFR0032 passive buzzer
#
# Wiring:
#   GPIO4  → buzzer signal (LEDC PWM)
#   GPIO5  → radar OT2 presence output (digital input, pulldown)
#   GPIO7  → radar TX (radar → ESP, monitoring data — ASCII or binary frames)
#   GPIO3  → radar RX (ESP → radar, optional — only needed to send the Report
#                       Mode command for binary frames with energy data)

# -----------------------------------------------------------------------
# TUNABLE SUBSTITUTIONS — edit these before flashing, no code changes needed
# -----------------------------------------------------------------------
substitutions:
  # Default alarm window (HH:MM:SS, 24h). Stored in the datetime entities at runtime,
  # restored across reboots. Edit these for the boot default; the UI overrides them.
  alarm_window_start: "08:30:00"
  alarm_window_end:   "09:30:00"

  # Normal alarm: loud, continuous. Duty is a runtime slider; this is the boot default.
  alarm_freq_hz:       "2500"   # 2–3 kHz is most piercing for piezo buzzers
  alarm_duty_default:  "80"     # percentage, 0–100

  # Debug/calibration: gentle intermittent pip
  debug_freq_hz:  "1000"   # lower pitch, less aggressive
  debug_duty:     "0.15"   # quiet — you'll be right next to it while calibrating

# -----------------------------------------------------------------------
# BOARD & FRAMEWORK
# -----------------------------------------------------------------------
esphome:
  name: failsafe-alarm
  friendly_name: Failsafe Alarm
  on_boot:
    # Priority -100: runs after all entities have restored their saved values from flash,
    # so configure_radar reads the correct slider values, not just initial_value defaults.
    priority: -100
    then:
      - delay: 3000ms
      - script.execute: configure_radar

esp32:
  # esp32-c3-devkitm-1 is the upstream ESPHome/PlatformIO alias for the C3 DevKit.
  # The Olimex ESP32-C3-DevKit-Lipo shares the same ESP32-C3 chip and 4MB flash;
  # this board definition works correctly for our pin usage.
  board: esp32-c3-devkitm-1
  variant: ESP32C3
  framework:
    type: arduino

# -----------------------------------------------------------------------
# LOGGING
# -----------------------------------------------------------------------
logger:
  level: INFO

# -----------------------------------------------------------------------
# WI-FI + FALLBACK AP
# If the main Wi-Fi is unreachable (e.g. router down) the device brings up a
# fallback access point so you can still reach it for OTA or debug.
# -----------------------------------------------------------------------
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # Never reboot due to Wi-Fi loss. A soft reboot doesn't power-cycle the radar
  # MCU, which can leave OT2 stuck. The alarm must keep running on flaky Wi-Fi.
  reboot_timeout: 0s
  ap:
    ssid: "failsafe-fallback"
    password: !secret fallback_ap_password

captive_portal:   # serves a Wi-Fi config page on the fallback AP

# Web interface at http://failsafe-alarm.local — exposes switches and sensors
web_server:
  port: 80

# -----------------------------------------------------------------------
# OTA + API
# OTA lets you reflash over Wi-Fi after the first USB flash.
# The native API exposes switches/sensors to the ESPHome dashboard and,
# optionally, to Home Assistant (not required for this build).
# -----------------------------------------------------------------------
ota:
  - platform: esphome
    password: !secret ota_password

api:
  # Never reboot due to lost API client. Same reasoning as wifi reboot_timeout —
  # a soft reboot doesn't reset the radar, only a USB power cycle does.
  reboot_timeout: 0s
  encryption:
    key: !secret api_key   # generate with: openssl rand -base64 32

# -----------------------------------------------------------------------
# TIME — SNTP with Europe/London timezone (handles GMT↔BST automatically)
# ESPHome's SNTP component re-syncs on its own periodic schedule (~24h),
# so DST changes are picked up without any extra configuration.
# -----------------------------------------------------------------------
time:
  - platform: sntp
    id: sntp_time
    timezone: "Europe/London"
    servers:
      - 0.uk.pool.ntp.org
      - 1.uk.pool.ntp.org
      - 2.pool.ntp.org
    on_time_sync:
      - logger.log:
          level: INFO
          format: "SNTP time synced"

    on_time:
      # Re-evaluate every minute so runtime window changes take effect promptly.
      # evaluate_buzzer handles both "window just opened" and "window just closed"
      # via its lambda — no need for separate open/close triggers.
      - seconds: 0
        minutes: /1
        then:
          - script.execute: evaluate_buzzer

# -----------------------------------------------------------------------
# UART — radar monitoring (GPIO7 = radar TX → ESP RX, mandatory for monitoring)
#                          (GPIO3 = ESP TX → radar RX, only if sending Report Mode)
# OT2 (GPIO5) drives the alarm; UART data is for the web-UI sensors only.
# -----------------------------------------------------------------------
uart:
  - id: radar_uart
    tx_pin: GPIO3
    rx_pin: GPIO7
    baud_rate: 115200

# -----------------------------------------------------------------------
# OUTPUT — passive buzzer via LEDC PWM on GPIO4
# Frequency (pitch) and duty cycle (loudness proxy) are set at alarm time.
# Swapping to a louder transducer later: change the pin or add a MOSFET
# driver; the script layer above this doesn't need to change.
# -----------------------------------------------------------------------
output:
  - platform: ledc
    pin: GPIO4
    id: buzzer_out

# -----------------------------------------------------------------------
# BINARY SENSOR — radar OT2 presence pin on GPIO5. THIS is what triggers the alarm.
# OT2 goes HIGH while a person is detected, LOW when the zone is clear.
# delayed_off absorbs brief radar dropouts without delaying "person left" much.
# -----------------------------------------------------------------------
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO5
      mode:
        input: true
        pulldown: true   # defined LOW when radar absent or disconnected
    id: radar_presence
    name: "Radar Presence"
    device_class: occupancy
    filters:
      - delayed_off: 500ms
    on_press:
      - logger.log: "Radar: PRESENT"
      - script.execute: evaluate_buzzer
    on_release:
      # Core safety guarantee: presence loss → immediate silence.
      - logger.log: "Radar: ABSENT — silencing"
      - script.execute: silence

# -----------------------------------------------------------------------
# NUMBERS — runtime-adjustable sliders, all stored in flash across reboots
# -----------------------------------------------------------------------
number:
  - platform: template
    name: "Alarm Volume"
    id: alarm_volume
    icon: "mdi:volume-high"
    min_value: 0
    max_value: 100
    step: 5
    initial_value: ${alarm_duty_default}
    optimistic: true
    restore_value: true
    unit_of_measurement: "%"

  # Max detection gate (each gate ≈ 0.70m). Configures the radar's hardware
  # max-range via SetConfig param 0x01. Targets beyond this gate won't trigger
  # OT2 — i.e. won't sound the alarm. Press "Apply Radar Config" after changing.
  - platform: template
    name: "Radar Max Gate"
    id: radar_max_gate
    icon: "mdi:radar"
    min_value: 1
    max_value: 8
    step: 1
    initial_value: 2
    optimistic: true
    restore_value: true
    unit_of_measurement: "gates"

  # Seconds after a target leaves before the radar reports absence on OT2.
  # Configures the radar via SetConfig param 0x04. Low = fast alarm cutoff.
  - platform: template
    name: "Radar Disappearance Delay"
    id: radar_disappearance_delay
    icon: "mdi:timer-off"
    min_value: 0
    max_value: 30
    step: 1
    initial_value: 5
    optimistic: true
    restore_value: true
    unit_of_measurement: "s"


# -----------------------------------------------------------------------
# DATETIME — alarm window times (native HH:MM picker in the web UI)
# Stored in flash; survive reboots. evaluate_buzzer reads .hour and .minute.
# -----------------------------------------------------------------------
datetime:
  - platform: template
    name: "Window Start"
    id: window_start
    type: time
    icon: "mdi:clock-start"
    optimistic: true
    restore_value: true
    initial_value: "${alarm_window_start}"

  - platform: template
    name: "Window End"
    id: window_end
    type: time
    icon: "mdi:clock-end"
    optimistic: true
    restore_value: true
    initial_value: "${alarm_window_end}"

# -----------------------------------------------------------------------
# BUTTONS — manual triggers from the web UI
# -----------------------------------------------------------------------
button:
  # Pushes Max Gate + Disappearance Delay slider values to the radar over UART
  # and re-asserts Report Mode. Requires Radar RX wired to GPIO3.
  - platform: template
    name: "Apply Radar Config"
    icon: "mdi:radar"
    on_press:
      - script.execute: configure_radar

  # Triggers the radar's AutoThresholdGen (cmd 0x09). LEAVE THE ROOM FIRST —
  # the radar samples background noise for ~10s with no people in view, then
  # auto-tunes its internal thresholds.
  - platform: template
    name: "Auto-Calibrate Radar"
    icon: "mdi:tune-vertical"
    on_press:
      - script.execute: auto_calibrate_radar

  # Sounds the alarm tone at the current Alarm Volume for 3 seconds.
  - platform: template
    name: "Test Buzzer"
    icon: "mdi:bullhorn"
    on_press:
      - output.ledc.set_frequency:
          id: buzzer_out
          frequency: !lambda "return ${alarm_freq_hz};"
      - output.set_level:
          id: buzzer_out
          level: !lambda "return id(alarm_volume).state / 100.0;"
      - delay: 3s
      - output.turn_off: buzzer_out

# -----------------------------------------------------------------------
# SWITCHES
# -----------------------------------------------------------------------
switch:
  # Debug/calibration mode: buzzer follows presence regardless of time window.
  # Tone is gentle so you can work right next to the hardware while tuning.
  - platform: template
    name: "Debug Mode"
    id: debug_mode
    icon: "mdi:bug-check"
    optimistic: true
    restore_mode: ALWAYS_OFF   # never start in debug mode after a reboot
    on_turn_on:
      - logger.log:
          level: WARN
          format: "DEBUG MODE ON — time window ignored, volume reduced"
      - script.execute: evaluate_buzzer
    on_turn_off:
      - logger.log:
          level: WARN
          format: "DEBUG MODE OFF — normal time-gated behaviour"
      - script.execute: evaluate_buzzer   # re-evaluate: silence if outside window

# -----------------------------------------------------------------------
# INTERVAL — parse the radar's UART stream into web-UI sensors.
# The S3KM1110 defaults to Normal Mode and outputs ASCII like "ON\r\nRange 4\r\n"
# (gate number, each gate ≈ 70cm). If we successfully send the Report Mode
# command (requires ESP TX → radar RX wire), it switches to binary frames:
#   F4 F3 F2 F1 | len LE (2) | detected (1) | dist LE (2) | 16-gate energies
#   (32) | F8 F7 F6 F5  — 45 bytes total. Parser auto-detects which is arriving.
# -----------------------------------------------------------------------
interval:
  - interval: 50ms
    then:
      - lambda: |-
          // Parser handles both radar output formats:
          //   Binary Report Mode: F4 F3 F2 F1 ... F8 F7 F6 F5
          //   ASCII Normal Mode : "ON\r\nRange N\r\n" / "OFF\r\nRange N\r\n"
          // Command ACK frames (FD FC FB FA ...) are silently consumed.
          static uint8_t buf[64];
          static uint8_t pos = 0;
          static uint8_t frame_type = 0;   // 0=idle, 1=F4 data, 2=FD ack, 3=ASCII
          static bool ascii_detected = false;

          while (id(radar_uart).available()) {
            uint8_t b = 0;
            if (!id(radar_uart).read_byte(&b)) break;

            if (frame_type == 0) {
              if      (b == 0xF4) { buf[0] = b; pos = 1; frame_type = 1; }
              else if (b == 0xFD) { buf[0] = b; pos = 1; frame_type = 2; }
              else if (b >= 0x20 && b < 0x7F) { buf[0] = b; pos = 1; frame_type = 3; }
              continue;
            }

            if (frame_type == 1) {                 // Binary Report Mode
              if (pos == 1 && b != 0xF3) { frame_type = 0; pos = 0; continue; }
              if (pos == 2 && b != 0xF2) { frame_type = 0; pos = 0; continue; }
              if (pos == 3 && b != 0xF1) { frame_type = 0; pos = 0; continue; }
              if (pos < sizeof(buf)) buf[pos++] = b;
              else { frame_type = 0; pos = 0; continue; }
              if (pos >= 8) {
                uint16_t data_len   = buf[4] | (buf[5] << 8);
                uint16_t frame_size = 4 + 2 + data_len + 4;
                if (frame_size > sizeof(buf)) { frame_type = 0; pos = 0; continue; }
                if (pos == frame_size) {
                  if (buf[pos-4]==0xF8 && buf[pos-3]==0xF7 && buf[pos-2]==0xF6 && buf[pos-1]==0xF5) {
                    bool     detected = (buf[6] == 0x01);
                    uint16_t dist     = buf[7] | (buf[8] << 8);
                    uint8_t  max_gate = (uint8_t)id(radar_max_gate).state;
                    uint16_t peak     = 0;
                    for (uint8_t g = 0; g <= max_gate && g < 16; g++) {
                      uint16_t e = buf[9 + g*2] | (buf[10 + g*2] << 8);
                      if (e > peak) peak = e;
                    }
                    id(radar_distance).publish_state(detected ? (float)dist : 0.0f);
                    id(radar_peak_energy).publish_state((float)peak);
                    id(radar_target_type).publish_state(detected ? "present" : "absent");
                  }
                  frame_type = 0; pos = 0;
                }
              }
              continue;
            }

            if (frame_type == 2) {                 // Command ACK — consume and discard
              if (pos == 1 && b != 0xFC) { frame_type = 0; pos = 0; continue; }
              if (pos == 2 && b != 0xFB) { frame_type = 0; pos = 0; continue; }
              if (pos == 3 && b != 0xFA) { frame_type = 0; pos = 0; continue; }
              if (pos < sizeof(buf)) buf[pos++] = b;
              else { frame_type = 0; pos = 0; continue; }
              if (pos >= 8) {
                uint16_t data_len   = buf[4] | (buf[5] << 8);
                uint16_t frame_size = 4 + 2 + data_len + 4;
                if (frame_size > sizeof(buf)) { frame_type = 0; pos = 0; continue; }
                if (pos == frame_size) { frame_type = 0; pos = 0; }
              }
              continue;
            }

            // frame_type == 3 (ASCII Normal Mode)
            if (b == 0xF4) { buf[0] = b; pos = 1; frame_type = 1; continue; }
            if (b == 0xFD) { buf[0] = b; pos = 1; frame_type = 2; continue; }
            if (pos < sizeof(buf) - 1) buf[pos++] = b;
            if (b == '\n') {
              buf[pos] = '\0';
              const char* s = (const char*)buf;
              if (strstr(s, "OFF")) {
                ascii_detected = false;
                id(radar_target_type).publish_state("absent");
                id(radar_distance).publish_state(0.0f);
              } else if (strstr(s, "ON")) {
                ascii_detected = true;
                id(radar_target_type).publish_state("present");
              } else {
                const char* rng = strstr(s, "Range ");
                if (rng) {
                  int gate = atoi(rng + 6);
                  id(radar_distance).publish_state(ascii_detected ? (float)(gate * 70) : 0.0f);
                }
              }
              frame_type = 0; pos = 0;
            }
          }

# -----------------------------------------------------------------------
# SCRIPTS
#   configure_radar      — pushes Max Gate + Disappearance Delay + Report Mode
#   auto_calibrate_radar — radar self-calibration (cmd 0x09); leave the room first
#   evaluate_buzzer      — single decision point; everything calls this
#   alarm_on             — activates the buzzer (different patterns for debug vs normal)
#   silence              — deactivates the buzzer and kills alarm_on
# -----------------------------------------------------------------------
script:
  # Protocol per https://github.com/2Grey/s3km1110 (S3KM1110 == LD2410-compatible):
  #   1. OpenCommandMode (0xFF, payload 0x0001) — required before SetConfig
  #   2. SetConfig MaxDistance      (0x07, param 0x01) — value = radar_max_gate
  #   3. SetConfig DisappearanceDelay (0x07, param 0x04) — value = radar_disappearance_delay (seconds, u16 LE)
  #   4. CloseCommandMode (0xFE)
  #   5. SetMode Report (0x12, value 0x00000004) — switch UART output to binary frames
  # Only documented ConfigParam IDs (0x00, 0x01, 0x04, 0x05) are safe; sending
  # undefined IDs has been shown to crash the radar MCU until power-cycled.
  - id: configure_radar
    mode: single
    then:
      - uart.write:
          id: radar_uart
          data: [0xFD,0xFC,0xFB,0xFA, 0x04,0x00, 0xFF,0x00, 0x01,0x00, 0x04,0x03,0x02,0x01]
      - delay: 100ms
      - lambda: |-
          uint8_t gate = (uint8_t)id(radar_max_gate).state;
          uint8_t cmd[] = {0xFD,0xFC,0xFB,0xFA, 0x08,0x00, 0x07,0x00,
                           0x01,0x00, gate,0x00,0x00,0x00, 0x04,0x03,0x02,0x01};
          id(radar_uart).write_array(cmd, sizeof(cmd));
      - delay: 100ms
      - lambda: |-
          uint16_t d = (uint16_t)id(radar_disappearance_delay).state;
          uint8_t cmd[] = {0xFD,0xFC,0xFB,0xFA, 0x08,0x00, 0x07,0x00,
                           0x04,0x00, (uint8_t)(d & 0xFF), (uint8_t)(d >> 8), 0x00,0x00,
                           0x04,0x03,0x02,0x01};
          id(radar_uart).write_array(cmd, sizeof(cmd));
      - delay: 100ms
      - uart.write:
          id: radar_uart
          data: [0xFD,0xFC,0xFB,0xFA, 0x02,0x00, 0xFE,0x00, 0x04,0x03,0x02,0x01]
      - delay: 100ms
      - uart.write:
          id: radar_uart
          data: [0xFD,0xFC,0xFB,0xFA, 0x08,0x00, 0x12,0x00, 0x00,0x00, 0x04,0x00,0x00,0x00, 0x04,0x03,0x02,0x01]
      - delay: 200ms
      - logger.log:
          level: INFO
          format: "Radar: config applied (max_gate, disappearance_delay) + Report Mode"

  # AutoThresholdGen (cmd 0x09). Frame payload is a guess from LD2410: three
  # u16 LE coefficients (motion-trigger, motion-hold, scan-seconds). Room MUST
  # be empty during the scan window; the radar will tune its noise floor.
  - id: auto_calibrate_radar
    mode: single
    then:
      - logger.log:
          level: WARN
          format: "Radar: auto-calibration starting — LEAVE THE ROOM FOR 15s"
      - uart.write:
          id: radar_uart
          data: [0xFD,0xFC,0xFB,0xFA, 0x04,0x00, 0xFF,0x00, 0x01,0x00, 0x04,0x03,0x02,0x01]
      - delay: 100ms
      - uart.write:
          id: radar_uart
          data: [0xFD,0xFC,0xFB,0xFA, 0x08,0x00, 0x09,0x00, 0x0A,0x00, 0x0A,0x00, 0x0A,0x00, 0x04,0x03,0x02,0x01]
      - delay: 12000ms
      - uart.write:
          id: radar_uart
          data: [0xFD,0xFC,0xFB,0xFA, 0x02,0x00, 0xFE,0x00, 0x04,0x03,0x02,0x01]
      - delay: 100ms
      - uart.write:
          id: radar_uart
          data: [0xFD,0xFC,0xFB,0xFA, 0x08,0x00, 0x12,0x00, 0x00,0x00, 0x04,0x00,0x00,0x00, 0x04,0x03,0x02,0x01]
      - delay: 200ms
      - logger.log:
          level: WARN
          format: "Radar: auto-calibration done — safe to return"

  # evaluate_buzzer: called on every state change (presence, debug toggle,
  # window open/close). Decides whether the buzzer should be on or off.
  - id: evaluate_buzzer
    mode: restart   # if called again before done, restart the decision
    then:
      - if:
          condition:
            lambda: |-
              // No point sounding if nobody is there
              if (!id(radar_presence).state) return false;

              // Debug mode: bypass time gate entirely
              if (id(debug_mode).state) return true;

              // Normal mode: require a valid time
              auto t = id(sntp_time).now();
              if (!t.is_valid()) return false;

              // day_of_week: 0=Sun, 1=Mon, …, 5=Fri, 6=Sat (ESPTime convention)
              if (t.day_of_week < 1 || t.day_of_week > 5) return false;

              int now_m   = t.hour * 60 + t.minute;
              int start_m = id(window_start).hour * 60 + id(window_start).minute;
              int end_m   = id(window_end).hour   * 60 + id(window_end).minute;
              return now_m >= start_m && now_m < end_m;
          then:
            - script.execute: alarm_on
          else:
            - script.execute: silence

  # alarm_on: activates the buzzer.
  # Normal mode: continuous full-volume tone.
  # Debug mode: quiet intermittent pip (while loop runs until presence drops
  # or debug is turned off; script.stop from `silence` kills it cleanly).
  - id: alarm_on
    mode: restart
    then:
      - if:
          condition:
            switch.is_on: debug_mode
          then:
            - while:
                condition:
                  and:
                    - switch.is_on: debug_mode
                    - binary_sensor.is_on: radar_presence
                then:
                  - output.ledc.set_frequency:
                      id: buzzer_out
                      frequency: !lambda "return ${debug_freq_hz};"
                  - output.set_level:
                      id: buzzer_out
                      level: ${debug_duty}
                  - delay: 150ms
                  - output.turn_off: buzzer_out
                  - delay: 850ms
          else:
            - output.ledc.set_frequency:
                id: buzzer_out
                frequency: !lambda "return ${alarm_freq_hz};"
            - output.set_level:
                id: buzzer_out
                level: !lambda "return id(alarm_volume).state / 100.0;"
            - logger.log:
                level: WARN
                format: "ALARM ON"

  # silence: turns off the output and kills any running alarm_on loop.
  # mode: single means stacked calls are dropped — idempotent and safe.
  - id: silence
    mode: single
    then:
      - output.turn_off: buzzer_out
      - script.stop: alarm_on
      - logger.log: "Buzzer SILENCED"

# -----------------------------------------------------------------------
# SENSORS — uptime and Wi-Fi signal for at-a-glance device health
# -----------------------------------------------------------------------
sensor:
  - platform: uptime
    name: "Uptime"
    update_interval: 60s

  - platform: wifi_signal
    name: "Wi-Fi Signal"
    update_interval: 60s

  # Distance to detected target. In ASCII mode this is gate × 70cm; in binary
  # Report Mode it is the radar's reported cm value. Pushed by the UART parser.
  - platform: template
    name: "Radar Distance"
    id: radar_distance
    unit_of_measurement: "cm"
    device_class: distance
    state_class: measurement
    accuracy_decimals: 0
    update_interval: never

  # Peak signal energy across gates 0..radar_max_gate. Only populated in binary
  # Report Mode (requires RX wire connected); stays NA in ASCII mode.
  - platform: template
    name: "Peak Gate Energy"
    id: radar_peak_energy
    state_class: measurement
    accuracy_decimals: 0
    update_interval: never

# -----------------------------------------------------------------------
# TEXT SENSORS — radar target state and overall alarm state
# -----------------------------------------------------------------------
text_sensor:
  - platform: template
    name: "Target Type"
    id: radar_target_type
    update_interval: never   # pushed by UART parser; "present" or "absent"

  - platform: template
    name: "Alarm Status"
    update_interval: 30s
    lambda: |-
      if (id(debug_mode).state)          return {"DEBUG (calibration)"};
      auto t = id(sntp_time).now();
      if (!t.is_valid())                 return {"no time sync"};
      int m = t.hour * 60 + t.minute;
      int s = id(window_start).hour * 60 + id(window_start).minute;
      int e = id(window_end).hour   * 60 + id(window_end).minute;
      bool wd = (t.day_of_week >= 1 && t.day_of_week <= 5);
      if (wd && m >= s && m < e)         return {"WINDOW ACTIVE"};
      return {"idle"};
